<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://yvuzccxqkkytuisgzpqx.supabase.co https://script.google.com https://script.googleusercontent.com; frame-src www.youtube.com player.vimeo.com; object-src 'none'; base-uri 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mis Cursos — Energía Holística Majo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Nunito:wght@200;300;400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --rose:    #c9858a;
      --rose-lt: #dba8ac;
      --blush:   #f0dada;
      --cream:   #faf5f0;
      --beige:   #ede0d4;
      --gold:    #c9a96e;
      --dark:    #3d2b2b;
      --muted:   #7a5c5c;
    }
    body { background: var(--cream); color: var(--dark); font-family: 'Nunito', sans-serif; font-weight: 300; }

    /* NAV */
    nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 22px 64px; background: rgba(250,245,240,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(201,133,138,0.12); z-index: 100; }
    .nav-logo { display: flex; flex-direction: column; line-height: 1.1; text-decoration: none; }
    .nav-logo-main { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 400; letter-spacing: 0.12em; color: var(--rose); }
    .nav-logo-sub  { font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); }
    .nav-back { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
    .nav-back:hover { color: var(--rose); }
    @media (max-width: 900px) {
      nav { padding: 18px 24px; }
      .nav-back { display: none; }
    }

    /* HEADER */
    .page-header { padding: 160px 64px 60px; background: linear-gradient(180deg, var(--blush) 0%, var(--cream) 100%); }
    .page-header .eyebrow { font-size: 0.65rem; letter-spacing: 0.45em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; }
    .page-header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 5vw, 3.6rem); font-weight: 300; color: var(--dark); margin-bottom: 10px; }
    .page-header h1 em { font-style: italic; color: var(--rose); }
    .page-header p { font-size: 0.9rem; color: var(--muted); line-height: 1.8; }
    @media (max-width: 900px) { .page-header { padding: 120px 24px 48px; } }

    /* GRID */
    .cursos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; padding: 48px 64px 100px; max-width: 1200px; margin: 0 auto; }
    @media (max-width: 900px)  { .cursos-grid { grid-template-columns: repeat(2,1fr); padding: 32px 24px 80px; gap: 20px; } }
    @media (max-width: 580px)  { .cursos-grid { grid-template-columns: 1fr; } }

    /* CARD */
    .curso-card { background: white; border-radius: 18px; overflow: hidden; box-shadow: 0 4px 24px rgba(61,43,43,0.07); transition: transform 0.3s, box-shadow 0.3s; display: flex; flex-direction: column; text-decoration: none; color: inherit; }
    .curso-card:hover { transform: translateY(-4px); box-shadow: 0 10px 36px rgba(61,43,43,0.12); }
    .curso-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
    .curso-img-placeholder { width: 100%; aspect-ratio: 16/9; background: linear-gradient(135deg, var(--blush), var(--beige)); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
    .curso-body { padding: 20px 22px 22px; flex: 1; display: flex; flex-direction: column; }
    .curso-cat { font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
    .curso-titulo { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 300; color: var(--dark); margin-bottom: 10px; line-height: 1.3; }
    .curso-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.75; margin-bottom: 18px; flex: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .curso-cta { display: inline-flex; align-items: center; gap: 8px; background: var(--rose); color: white; padding: 10px 22px; border-radius: 30px; font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; text-decoration: none; transition: all 0.2s; align-self: flex-start; border: none; cursor: pointer; }
    .curso-cta:hover { background: var(--dark); }

    /* VACÍO */
    .empty-state { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty-state .big { font-size: 3.5rem; margin-bottom: 20px; }
    .empty-state h2 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; color: var(--dark); margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; line-height: 1.8; margin-bottom: 28px; }
    .empty-state a { display: inline-flex; align-items: center; gap: 8px; background: var(--rose); color: white; padding: 12px 28px; border-radius: 30px; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; text-decoration: none; transition: all 0.2s; }
    .empty-state a:hover { background: var(--dark); }

    /* FOOTER */
    footer { text-align: center; padding: 32px; font-size: 0.78rem; color: var(--muted); border-top: 1px solid var(--beige); }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <span class="nav-logo-main">Energía Holística Majo</span>
    <span class="nav-logo-sub">Psicóloga & Terapeuta</span>
  </a>
  <a href="cursos.html" class="nav-back">← Todos los cursos</a>
  <div id="navUserArea" style="display:flex;align-items:center;gap:14px"></div>
</nav>

<header class="page-header">
  <p class="eyebrow">Mi espacio</p>
  <h1>Mis <em>cursos</em></h1>
  <p id="headerSub">Cargando…</p>
</header>

<main class="cursos-grid" id="cursosGrid">
  <div class="empty-state">
    <div class="big">✨</div>
    Cargando…
  </div>
</main>

<footer>
  <strong>Energía Holística Majo</strong> · Psicóloga &amp; Terapeuta Holística
</footer>

<script>
  function updateNavAuth(user, perfil) {
    const area = document.getElementById('navUserArea');
    if (!area) return;
    if (user) {
      const nombre = perfil?.nombre || user.email.split('@')[0];
      area.innerHTML = `
        <span style="font-size:0.72rem;color:var(--muted);font-family:'Nunito',sans-serif">${nombre}</span>
        <button id="navLogoutBtn" style="background:none;border:1.5px solid var(--beige);padding:6px 14px;border-radius:20px;font-family:'Nunito',sans-serif;font-size:0.68rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);cursor:pointer">Salir</button>`;
      area.querySelector('#navLogoutBtn').addEventListener('click', () => doLogout().then(() => location.href = 'cursos.html'));
    } else {
      area.innerHTML = `<button id="navLoginBtn" style="background:none;border:1.5px solid var(--rose);padding:7px 20px;border-radius:20px;font-family:'Nunito',sans-serif;font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--rose);cursor:pointer">Ingresar</button>`;
      area.querySelector('#navLoginBtn').addEventListener('click', () => openLogin('Inicia sesión para ver tus cursos'));
    }
  }

  async function loadMisCursos(user, perfil) {
    const grid   = document.getElementById('cursosGrid');
    const subEl  = document.getElementById('headerSub');

    if (!user) {
      subEl.textContent = 'Inicia sesión para ver tus cursos.';
      grid.innerHTML = `
        <div class="empty-state">
          <div class="big">🔒</div>
          <h2>Acceso <em style="font-style:italic;color:var(--rose)">privado</em></h2>
          <p>Inicia sesión para ver los cursos que has adquirido.</p>
          <button id="emptyLoginBtn" style="display:inline-flex;align-items:center;gap:8px;background:var(--rose);color:white;padding:12px 28px;border-radius:30px;font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;border:none;cursor:pointer;transition:all 0.2s">Iniciar sesión →</button>
        </div>`;
      document.getElementById('emptyLoginBtn').addEventListener('click', () => openLogin('Inicia sesión para ver tus cursos'));
      return;
    }

    const nombre = perfil?.nombre || user.email.split('@')[0];
    subEl.textContent = `Hola, ${nombre}. Aquí están tus cursos adquiridos.`;

    try {
      // 1. Obtener accesos del usuario
      const token = await getAuthToken();
      const r1 = await fetch(`${SB_URL}/rest/v1/accesos?user_id=eq.${user.id}&or=(estado.eq.activo,estado.is.null)&select=curso_id`, {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token }
      });
      const accesos = await r1.json();

      if (!Array.isArray(accesos) || !accesos.length) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="big">🌱</div>
            <h2>Aún no tienes <em style="font-style:italic;color:var(--rose)">cursos</em></h2>
            <p>Cuando adquieras un curso aparecerá aquí.<br>Explora nuestra oferta y elige el tuyo.</p>
            <a href="cursos.html">Ver todos los cursos →</a>
          </div>`;
        return;
      }

      // 2. Cargar datos de cada curso
      const ids = accesos.map(a => a.curso_id).join(',');
      const r2  = await fetch(`${SB_URL}/rest/v1/cursos?id=in.(${ids})&select=*`, {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token }
      });
      const cursos = await r2.json();

      if (!Array.isArray(cursos) || !cursos.length) {
        grid.innerHTML = `<div class="empty-state"><div class="big">🌸</div>No se encontraron los cursos.</div>`;
        return;
      }

      grid.innerHTML = cursos.map(c => {
        const imgHTML = c.imagen
          ? `<img class="curso-img" src="${c.imagen}" alt="${c.titulo}" loading="lazy"/>`
          : `<div class="curso-img-placeholder">✨</div>`;
        return `
          <a href="curso.html?id=${c.id}" class="curso-card">
            ${imgHTML}
            <div class="curso-body">
              ${c.categoria ? `<p class="curso-cat">${c.categoria}</p>` : ''}
              <h2 class="curso-titulo">${c.titulo}</h2>
              <p class="curso-desc">${c.descripcion || ''}</p>
              <span class="curso-cta">Continuar →</span>
            </div>
          </a>`;
      }).join('');

    } catch(e) {
      grid.innerHTML = `<div class="empty-state"><div class="big">😔</div>Error al cargar. Intenta de nuevo.</div>`;
    }
  }
</script>
<script src="js/auth.js"></script>
<script>
  // Banner al volver de MP
  (function() {
    const params    = new URLSearchParams(window.location.search);
    const pago      = params.get('pago');
    const paymentId = params.get('payment_id') || params.get('collection_id');
    const extRef    = params.get('external_reference') || '';

    if (!pago) return;
    history.replaceState({}, '', window.location.pathname);

    if (pago === 'ok') {
      const b = document.createElement('div');
      b.style.cssText = 'background:#d4edda;color:#155724;border:1px solid #c3e6cb;border-radius:10px;padding:16px 20px;margin:24px auto 0;max-width:860px;text-align:center;font-size:1rem;';
      b.innerHTML = '✅ <strong>¡Acceso activado!</strong> Tu pago fue procesado. El curso ya está disponible abajo. 🌸';
      document.querySelector('main')?.before(b);

      if (paymentId && typeof APPS_URL !== 'undefined') {
        const appsUrl = APPS_URL + '?action=confirmarPago&payment_id=' + encodeURIComponent(paymentId)
          + (extRef ? '&external_reference=' + encodeURIComponent(extRef) : '');
        fetch(appsUrl).catch(() => {});
      }

    } else if (pago === 'error') {
      if (extRef.startsWith('acceso:') && typeof SB_URL !== 'undefined') {
        const id = extRef.split(':')[1];
        fetch(SB_URL + '/rest/v1/accesos?id=eq.' + id + '&estado=eq.pendiente', {
          method: 'DELETE',
          headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
        }).catch(() => {});
      }
      const b = document.createElement('div');
      b.style.cssText = 'background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;border-radius:10px;padding:16px 20px;margin:24px auto 0;max-width:860px;text-align:center;font-size:1rem;';
      b.innerHTML = '❌ <strong>El pago no fue procesado.</strong> Puedes intentarlo de nuevo.';
      document.querySelector('main')?.before(b);
    }
  })();

  initAuth(async (user, perfil) => {
    updateNavAuth(user, perfil);
    await loadMisCursos(user, perfil);
  });
</script>
</body>
</html>
