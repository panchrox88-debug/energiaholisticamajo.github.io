<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://yvuzccxqkkytuisgzpqx.supabase.co https://script.google.com https://script.googleusercontent.com; object-src 'none'; base-uri 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Encuentro — Energía Holística Majo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Nunito:wght@200;300;400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --rose:    #c9858a; --rose-lt: #dba8ac; --blush:   #f0dada;
      --cream:   #faf5f0; --beige:   #ede0d4; --gold:    #c9a96e;
      --dark:    #3d2b2b; --muted:   #7a5c5c;
    }
    html { font-size: 18px; }
    body { background: var(--cream); color: var(--dark); font-family: 'Nunito', sans-serif; font-weight: 300; }

    nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 22px 64px; background: rgba(250,245,240,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(201,133,138,0.12); z-index: 100; flex-wrap: wrap; gap: 8px; }
    .nav-logo { display: flex; flex-direction: column; line-height: 1.1; text-decoration: none; }
    .nav-logo-main { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 400; letter-spacing: 0.12em; color: var(--rose); }
    .nav-logo-sub  { font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); }
    .nav-back { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
    .nav-back:hover { color: var(--rose); }
    @media (max-width: 900px) { nav { padding: 18px 24px; } .nav-back { display: none; } }

    .enc-hero { margin-top: 80px; position: relative; width: 100%; max-height: 420px; overflow: hidden; }
    .enc-hero img { width: 100%; height: 420px; object-fit: cover; display: block; }
    .enc-hero-placeholder { width: 100%; height: 280px; background: linear-gradient(135deg, var(--blush), var(--beige)); display: flex; align-items: center; justify-content: center; font-size: 4rem; }

    .enc-layout { max-width: 900px; margin: 0 auto; padding: 48px 64px 100px; display: grid; grid-template-columns: 1fr 340px; gap: 48px; align-items: start; }
    @media (max-width: 900px) {
      .enc-hero img { height: 240px; }
      .enc-hero-placeholder { height: 180px; }
      .enc-layout { grid-template-columns: 1fr; padding: 32px 24px 80px; gap: 32px; }
      .enc-sidebar { position: static; }
    }

    .enc-eyebrow { font-size: 0.65rem; letter-spacing: 0.45em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
    .enc-titulo { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 300; color: var(--dark); margin-bottom: 16px; line-height: 1.2; }
    .enc-titulo em { font-style: italic; color: var(--rose); }
    .enc-meta-row { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 28px; }
    .enc-badge { display: inline-flex; align-items: center; gap: 6px; background: white; border: 1px solid var(--beige); padding: 6px 14px; border-radius: 20px; font-size: 0.78rem; color: var(--muted); }
    .enc-desc-full { font-size: 0.9rem; line-height: 1.9; color: var(--muted); white-space: pre-wrap; word-break: break-word; }

    /* ── Carrusel de fotos ── */
    .enc-galeria { max-width: 900px; margin: 0 auto; padding: 0 64px 0; }
    @media (max-width: 900px) { .enc-galeria { padding: 0 24px; } }
    .enc-galeria-titulo { font-size: 0.65rem; letter-spacing: 0.45em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
    .carrusel { position: relative; border-radius: 16px; overflow: hidden; background: var(--beige); aspect-ratio: 16/7; }
    .carrusel-track { display: flex; height: 100%; transition: transform 0.45s cubic-bezier(0.22,1,0.36,1); }
    .carrusel-slide { flex-shrink: 0; width: 100%; height: 100%; }
    .carrusel-slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .carrusel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(250,245,240,0.85); border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: background 0.2s; z-index: 2; color: var(--dark); }
    .carrusel-btn:hover { background: white; }
    .carrusel-prev { left: 12px; }
    .carrusel-next { right: 12px; }
    .carrusel-dots { display: flex; justify-content: center; gap: 8px; margin-top: 12px; }
    .carrusel-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--beige); border: none; cursor: pointer; padding: 0; transition: background 0.2s, transform 0.2s; }
    .carrusel-dot.active { background: var(--rose); transform: scale(1.3); }

    /* Sidebar */
    .enc-sidebar { background: white; border-radius: 20px; padding: 28px; box-shadow: 0 4px 24px rgba(61,43,43,0.07); position: sticky; top: 100px; }
    .enc-precio-big { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; color: var(--dark); margin-bottom: 6px; }
    .enc-precio-big.gratis { color: var(--gold); }
    .enc-cupo-info { font-size: 0.8rem; color: var(--muted); margin-bottom: 20px; }
    .enc-cupo-bar { height: 4px; background: var(--beige); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
    .enc-cupo-fill { height: 100%; background: var(--rose); border-radius: 2px; transition: width 0.5s; }

    .form-field { margin-bottom: 14px; }
    .form-field label { display: block; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .form-field input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--beige); border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 0.88rem; color: var(--dark); background: var(--cream); outline: none; transition: border-color 0.2s; }
    .form-field input:focus { border-color: var(--rose-lt); }
    .form-field input[readonly] { background: white; color: var(--muted); cursor: default; }
    @media (max-width: 900px) {
      .form-field input { font-size: 16px; } /* iOS: evitar zoom */
    }

    .btn-inscribir { width: 100%; padding: 14px; background: var(--rose); color: white; border: none; border-radius: 30px; font-family: 'Nunito', sans-serif; font-size: 0.82rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; margin-top: 6px; }
    .btn-inscribir:hover:not(:disabled) { background: var(--dark); }
    .btn-inscribir:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-agotado { width: 100%; padding: 14px; background: var(--beige); color: var(--muted); border: none; border-radius: 30px; font-family: 'Nunito', sans-serif; font-size: 0.82rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: not-allowed; }

    .form-msg { font-size: 0.8rem; margin-top: 12px; padding: 10px 14px; border-radius: 10px; display: none; }
    .form-msg.ok  { background: #f0f9f0; color: #4a7c59; display: block; }
    .form-msg.err { background: #fdf0f0; color: #c9858a; display: block; }

    .success-state { text-align: center; padding: 20px 0; }
    .success-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .success-state h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 300; color: var(--dark); margin-bottom: 8px; }
    .success-state p { font-size: 0.82rem; color: var(--muted); line-height: 1.7; }

    footer { text-align: center; padding: 32px; font-size: 0.78rem; color: var(--muted); border-top: 1px solid var(--beige); }

    /* Cuerpo +2px mobile */
    @media (max-width: 900px) {
      .enc-desc-full   { font-size: 1.025rem; }
      .enc-cupo-info   { font-size: 0.925rem; }
      .success-state p { font-size: 0.945rem; }
    }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">
    <span class="nav-logo-main">Energía Holística Majo</span>
    <span class="nav-logo-sub">Psicóloga & Terapeuta</span>
  </a>
  <a href="encuentros.html" class="nav-back">← Encuentros</a>
  <div id="navUserArea" style="display:flex;align-items:center;gap:14px"></div>
</nav>

<div id="heroArea"></div>
<div class="enc-galeria" id="encGaleria" style="display:none;margin-bottom:0;padding-bottom:0"></div>

<div class="enc-layout" id="encLayout" style="display:none">
  <div class="enc-main">
    <p class="enc-eyebrow" id="encMotivo"></p>
    <h1 class="enc-titulo" id="encTitulo"></h1>
    <div class="enc-meta-row" id="encMeta"></div>
    <p class="enc-desc-full" id="encDesc"></p>
  </div>
  <aside class="enc-sidebar" id="encSidebar"></aside>
</div>

<footer><strong>Energía Holística Majo</strong> · Psicóloga &amp; Terapeuta Holística</footer>

<script>
  const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const DIAS  = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];

  function fmtFecha(f) {
    if (!f) return '';
    const [y, m, d] = f.split('-');
    const dt = new Date(parseInt(y), parseInt(m)-1, parseInt(d));
    return `${DIAS[dt.getDay()]} ${parseInt(d)} de ${MESES[parseInt(m)-1]} de ${y}`;
  }
  function fmtHora(h) { return h ? h.substring(0,5) : ''; }

  let _encuentro = null;
  let _inscritos = 0;
  let _pagoHandled = false; // evita que initAuth sobreescriba el estado de éxito

  async function loadEncuentro() {
    const id = new URLSearchParams(location.search).get('id');
    if (!id) { location.href = 'encuentros.html'; return; }

    try {
      const [r1, r2] = await Promise.all([
        fetch(`${SB_URL}/rest/v1/encuentros?id=eq.${id}&select=*`, { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY } }),
        fetch(`${SB_URL}/rest/v1/inscripciones?encuentro_id=eq.${id}&estado=eq.confirmada&select=id`, { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY } })
      ]);
      const [rows, inscs] = await Promise.all([r1.json(), r2.json()]);
      if (!rows?.length) { location.href = 'encuentros.html'; return; }

      _encuentro = rows[0];
      _inscritos  = (inscs || []).length;
      renderEncuentro();
    } catch(e) {
      document.getElementById('heroArea').innerHTML = '<p style="text-align:center;padding:80px;color:var(--muted)">Error al cargar. Intenta de nuevo.</p>';
    }
  }

  function renderEncuentro() {
    const e = _encuentro;

    // Hero
    document.getElementById('heroArea').innerHTML = e.imagen
      ? `<div class="enc-hero"><img src="${e.imagen}" alt="${e.titulo}"/></div>`
      : `<div class="enc-hero"><div class="enc-hero-placeholder">🌿</div></div>`;

    document.title = e.titulo + ' — Energía Holística Majo';
    document.getElementById('encMotivo').textContent = e.motivo || 'Encuentro';
    document.getElementById('encTitulo').innerHTML   = e.titulo;
    document.getElementById('encDesc').textContent   = e.descripcion || '';

    // Meta badges
    const agotado = e.cupo_maximo && _inscritos >= e.cupo_maximo;
    document.getElementById('encMeta').innerHTML = `
      <span class="enc-badge">📅 ${fmtFecha(e.fecha)}</span>
      <span class="enc-badge">🕐 ${fmtHora(e.hora_inicio)}–${fmtHora(e.hora_fin)}</span>
      <span class="enc-badge">${e.modalidad === 'online' ? '💻 Online' : '🌸 Presencial'}</span>
      ${e.cupo_maximo ? `<span class="enc-badge">${_inscritos}/${e.cupo_maximo} inscritas</span>` : '<span class="enc-badge">✨ Cupo libre</span>'}
    `;

    renderSidebar(agotado);
    renderGaleria(e.fotos);
    document.getElementById('encLayout').style.display = 'grid';

    // Verificar retorno desde MP Checkout (solo una vez)
    if (!_pagoHandled) {
      const _params = new URLSearchParams(window.location.search);
      if (_params.get('pago') === 'ok') {
        _pagoHandled = true;
        history.replaceState({}, '', '?id=' + e.id);
        sessionStorage.removeItem('enc_return');
        const formEl = document.getElementById('formInscripcion');
        if (formEl) {
          formEl.innerHTML = `
            <div class="success-state">
              <div class="icon">🌸</div>
              <h3>¡Pago confirmado!</h3>
              <p>Tu inscripción para <strong>${e.titulo}</strong> fue procesada.<br>
              Te esperamos el <strong>${fmtFecha(e.fecha)}</strong> a las <strong>${fmtHora(e.hora_inicio)}</strong>. 🌿</p>
            </div>`;
        }
      } else if (_params.get('pago') === 'error') {
        _pagoHandled = true;
        history.replaceState({}, '', '?id=' + e.id);
        const msgEl = document.getElementById('formMsg');
        if (msgEl) {
          msgEl.className = 'form-msg err';
          msgEl.textContent = 'El pago no pudo procesarse. Puedes intentarlo de nuevo.';
        }
      }
    }
  }

  function renderGaleria(fotos) {
    const el = document.getElementById('encGaleria');
    if (!fotos || !fotos.length) { el.style.display = 'none'; return; }
    el.style.display = 'block';
    el.style.paddingBottom = '32px';
    el.innerHTML = `
      <p class="enc-galeria-titulo">Galería</p>
      <div class="carrusel" id="carrusel">
        <div class="carrusel-track" id="carruselTrack">
          ${fotos.map(url => `<div class="carrusel-slide"><img src="${url}" alt="foto"/></div>`).join('')}
        </div>
        ${fotos.length > 1 ? `
          <button class="carrusel-btn carrusel-prev" onclick="moverCarrusel(-1)">‹</button>
          <button class="carrusel-btn carrusel-next" onclick="moverCarrusel(1)">›</button>
        ` : ''}
      </div>
      ${fotos.length > 1 ? `
        <div class="carrusel-dots" id="carruselDots">
          ${fotos.map((_,i) => `<button class="carrusel-dot${i===0?' active':''}" onclick="irSlide(${i})"></button>`).join('')}
        </div>
      ` : ''}`;
    _slideActual = 0;
  }

  let _slideActual = 0;
  window.moverCarrusel = function(dir) {
    const fotos = _encuentro?.fotos || [];
    _slideActual = (_slideActual + dir + fotos.length) % fotos.length;
    _actualizarCarrusel();
  };
  window.irSlide = function(i) {
    _slideActual = i;
    _actualizarCarrusel();
  };
  function _actualizarCarrusel() {
    const track = document.getElementById('carruselTrack');
    if (track) track.style.transform = `translateX(-${_slideActual * 100}%)`;
    document.querySelectorAll('.carrusel-dot').forEach((d, i) => d.classList.toggle('active', i === _slideActual));
  }

  function renderSidebar(agotado) {
    const e = _encuentro;
    const pct = e.cupo_maximo ? Math.min(100, Math.round(_inscritos / e.cupo_maximo * 100)) : 0;
    const precioHTML = e.precio > 0
      ? `<div class="enc-precio-big">$${Number(e.precio).toLocaleString('es-CL')}</div>`
      : `<div class="enc-precio-big gratis">Gratuito</div>`;

    const cupoBar = e.cupo_maximo ? `
      <div class="enc-cupo-info">${_inscritos} de ${e.cupo_maximo} cupos ocupados</div>
      <div class="enc-cupo-bar"><div class="enc-cupo-fill" style="width:${pct}%"></div></div>` : '';

    if (agotado) {
      document.getElementById('encSidebar').innerHTML = `
        ${precioHTML}${cupoBar}
        <button class="btn-agotado">Cupo lleno</button>`;
      return;
    }

    const esPago = e.precio > 0;

    // Gate de auth para encuentros de pago
    if (esPago && !_bkUser) {
      document.getElementById('encSidebar').innerHTML = `
        ${precioHTML}${cupoBar}
        <div style="text-align:center;padding:24px 8px">
          <p style="font-size:0.88rem;color:var(--dark);margin-bottom:6px">Para inscribirte necesitas iniciar sesión</p>
          <p style="font-size:0.78rem;color:var(--muted);margin-bottom:18px">Así podrás ver tus inscripciones fácilmente 🌸</p>
          <button onclick="openLogin('Inicia sesión para inscribirte')"
            style="background:var(--rose);color:white;border:none;border-radius:20px;padding:10px 28px;font-family:'Nunito',sans-serif;font-size:0.78rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer">
            Iniciar sesión →
          </button>
        </div>`;
      return;
    }

    document.getElementById('encSidebar').innerHTML = `
      ${precioHTML}${cupoBar}
      <div id="formInscripcion">
        <div class="form-field">
          <label>Nombre completo *</label>
          <input type="text" id="insNombre" placeholder="Tu nombre" autocomplete="name"/>
        </div>
        <div class="form-field">
          <label>Email *</label>
          <input type="email" id="insEmail" placeholder="tu@email.com" autocomplete="email"/>
        </div>
        <div class="form-field">
          <label>Confirma tu número de teléfono</label>
          <input type="tel" id="insTelefono" placeholder="+56 9 1234 5678" autocomplete="tel"/>
        </div>
        <div id="formMsg" class="form-msg"></div>
        <button class="btn-inscribir" id="btnInscribir" onclick="inscribirse()">Inscribirme →</button>
      </div>`;

    // Pre-llenar y bloquear campos desde el perfil
    if (_bkUser) {
      const n  = document.getElementById('insNombre');
      const em = document.getElementById('insEmail');
      const t  = document.getElementById('insTelefono');
      n.value  = _bkPerfil?.nombre || _bkUser.user_metadata?.full_name || _bkUser.user_metadata?.nombre || '';
      n.readOnly = !!n.value;
      em.value = _bkUser.email || '';
      em.readOnly = true;
      if (!t.value) t.value = _bkPerfil?.telefono || '';
    }
  }

  async function inscribirse() {
    const btn      = document.getElementById('btnInscribir');
    const msgEl    = document.getElementById('formMsg');
    const nombre   = document.getElementById('insNombre').value.trim();
    const email    = document.getElementById('insEmail').value.trim();
    const telefono = document.getElementById('insTelefono').value.trim();

    msgEl.className = 'form-msg';
    msgEl.textContent = '';

    if (!nombre || !email) {
      msgEl.className = 'form-msg err';
      msgEl.textContent = 'Completa nombre y email para inscribirte.';
      return;
    }

    const esPago = _encuentro.precio > 0;
    btn.disabled = true;
    btn.textContent = esPago ? 'Procesando pago…' : 'Procesando…';

    try {
      // 1. Insertar inscripción (pendiente_pago si es pago, confirmada si es gratis)
      const res = await fetch(`${SB_URL}/rest/v1/inscripciones?select=id`, {
        method: 'POST',
        headers: {
          'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY,
          'Content-Type': 'application/json', 'Prefer': 'return=representation'
        },
        body: JSON.stringify({
          encuentro_id:     _encuentro.id,
          nombre_cliente:   nombre,
          email_cliente:    email,
          telefono_cliente: telefono,
          estado:           esPago ? 'pendiente_pago' : 'confirmada',
          user_id:          _bkUser?.id || null
        })
      });
      if (!res.ok) throw new Error('Error al inscribirse');
      const [inscripcion] = await res.json();

      if (esPago) {
        // 2. Guardar contexto para mostrar al volver de MP
        sessionStorage.setItem('enc_return', JSON.stringify({
          titulo: _encuentro.titulo,
          fecha:  fmtFecha(_encuentro.fecha),
          hora:   fmtHora(_encuentro.hora_inicio),
          nombre,
        }));

        // 3. Crear preferencia MP vía Apps Script
        const base  = window.location.href.split('?')[0];
        const encId = encodeURIComponent(_encuentro.id);
        const mpRes = await fetch(
          `${APPS_URL}?action=crearPago` +
          `&tipo=inscripcion&id=${encodeURIComponent(inscripcion.id)}` +
          `&titulo=${encodeURIComponent(_encuentro.titulo)}` +
          `&precio=${_encuentro.precio}` +
          `&email=${encodeURIComponent(email)}` +
          `&retorno_ok=${encodeURIComponent(new URL('mis-encuentros.html?pago=ok', window.location.href).href)}` +
          `&retorno_error=${encodeURIComponent(new URL('encuentro.html?id=' + encodeURIComponent(_encuentro.id) + '&pago=error', window.location.href).href)}`
        );
        const mpData = await mpRes.json();
        if (!mpData.ok) throw new Error(mpData.error || 'Error al crear preferencia de pago');

        // 4. Redirigir a Mercado Pago Checkout
        window.location.href = mpData.url;
        return;
      }

      // Gratis: mostrar éxito directo
      document.getElementById('formInscripcion').innerHTML = `
        <div class="success-state">
          <div class="icon">🌸</div>
          <h3>¡Inscripción confirmada!</h3>
          <p>Te esperamos el <strong>${fmtFecha(_encuentro.fecha)}</strong> a las <strong>${fmtHora(_encuentro.hora_inicio)}</strong>.<br>¡Nos vemos pronto! 🌿</p>
        </div>`;
      _inscritos++;

    } catch(e) {
      btn.disabled = false;
      btn.textContent = 'Inscribirme →';
      msgEl.className = 'form-msg err';
      msgEl.textContent = 'Hubo un error. Intenta de nuevo.';
    }
  }

  loadEncuentro();
</script>
<script src="js/auth.js"></script>
<script>
  var _bkUser = null, _bkPerfil = null;
  initAuth(function(user, perfil) {
    updateNavAuth(user, perfil);
    _bkUser   = user;
    _bkPerfil = perfil;
    // Si hay un encuentro de pago cargado, re-renderizar sidebar con el nuevo estado de auth
    if (_encuentro && !_pagoHandled) renderEncuentro();
  });
</script>
</body>
</html>
