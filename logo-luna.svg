<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 175" fill="none">
  <g stroke="#c9858a" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- Luna: dos arcos circulares reales compartiendo las mismas puntas -->
    <!-- Arco exterior r=71 centro(100,89): pasa por (100,160) — curva profunda hacia abajo -->
    <!-- Arco interior r=97 centro(100,33): pasa por (100,130) — curva suave, crea el hueco -->
    <path d="M 30,100 A 71,71 0 0,0 170,100 A 97,97 0 0,1 30,100 Z" stroke-width="1.7"/>

    <!-- Líneas decorativas dentro del cuerpo de la luna -->
    <line x1="67" y1="134" x2="92" y2="134" stroke-width="1.3"/>
    <line x1="70" y1="142" x2="96" y2="142" stroke-width="1.3"/>
    <line x1="73" y1="149" x2="99" y2="149" stroke-width="1.3"/>

    <!-- Diamante en el fondo del hueco interior -->
    <path d="M 100,122 L 105,130 L 100,138 L 95,130 Z" stroke-width="1.3"/>
  </g>

  <!-- Estrella grande (4 puntas), centro (107,78) -->
  <path d="M 107,65 L 111.5,73.5 L 120,78 L 111.5,82.5 L 107,91 L 102.5,82.5 L 94,78 L 102.5,73.5 Z" fill="#c9858a"/>

  <!-- Estrella pequeña (4 puntas), centro (127,63) -->
  <path d="M 127,54 L 130,60 L 136,63 L 130,66 L 127,72 L 124,66 L 118,63 L 124,60 Z" fill="#c9858a"/>
</svg>
