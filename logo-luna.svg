<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 215" fill="none">
  <!--
    Energía Holística Majo — Logo Luna
    Color principal: #c9858a  (var(--rose))
    Uso inline: <img src="logo-luna.svg"> o copiar el contenido del <svg> directo en el HTML
  -->

  <!-- ── Luna creciente (rotada ~15° CCW para que la apertura mire arriba-derecha) ── -->
  <g transform="translate(100,107) rotate(-15) translate(-100,-107)"
     stroke="#c9858a" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!--
      Path: dos arcos entre los extremos de la luna
        · Arco exterior (grande, va por la izquierda): rx=ry=91
        · Arco interior (pequeño, vuelve por la derecha): rx=ry=80
      Extremos: punta superior (100,30) — punta inferior (100,182)
      Distancia entre puntas = 152 → mínimo radio = 76 → ambos radios cumplen ✓
    -->
    <path d="M 100,30
             A 91,91 0 1,0 100,182
             A 80,80 0 0,1 100,30
             Z"
          stroke-width="1.7"/>

    <!-- Líneas decorativas dentro del cuerpo de la luna -->
    <!-- Calculadas para el crescent body entre x≈49 y x≈65 a esas alturas -->
    <line x1="50" y1="82"  x2="65" y2="82"  stroke-width="1.3"/>
    <line x1="46" y1="106" x2="62" y2="106" stroke-width="1.3"/>
    <line x1="50" y1="130" x2="65" y2="130" stroke-width="1.3"/>

    <!-- Diamante en la punta inferior -->
    <path d="M 100,173 L 105,180 L 100,187 L 95,180 Z" stroke-width="1.3"/>
  </g>

  <!-- ── Estrella grande (4 puntas) — arriba-derecha de la luna ── -->
  <!-- Centro (136,58), radio largo=13, radio corto=4.5 -->
  <path d="M 136,45
           L 140.5,53.5 L 149,58
           L 140.5,62.5 L 136,71
           L 131.5,62.5 L 123,58
           L 131.5,53.5 Z"
        fill="#c9858a"/>

  <!-- ── Estrella pequeña (4 puntas) — más arriba y a la derecha ── -->
  <!-- Centro (154,33), radio largo=9, radio corto=3 -->
  <path d="M 154,24
           L 157,30 L 163,33
           L 157,36 L 154,42
           L 151,36 L 145,33
           L 151,30 Z"
        fill="#c9858a"/>

</svg>
