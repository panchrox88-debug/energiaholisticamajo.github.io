<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mis Sesiones — Energía Holística Majo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Nunito:wght@200;300;400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --rose:    #c9858a;
      --rose-lt: #dba8ac;
      --blush:   #f0dada;
      --cream:   #faf5f0;
      --beige:   #ede0d4;
      --gold:    #c9a96e;
      --dark:    #3d2b2b;
      --muted:   #7a5c5c;
      --green:   #5a9a7a;
      --red:     #c9585a;
    }
    body { background: var(--cream); color: var(--dark); font-family: 'Nunito', sans-serif; font-weight: 300; }

    /* NAV */
    nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 22px 64px; background: rgba(250,245,240,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(201,133,138,0.12); z-index: 100; }
    .nav-logo { display: flex; flex-direction: column; line-height: 1.1; text-decoration: none; }
    .nav-logo-main { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 400; letter-spacing: 0.12em; color: var(--rose); }
    .nav-logo-sub  { font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); }
    .nav-back { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
    .nav-back:hover { color: var(--rose); }
    @media (max-width: 900px) { nav { padding: 18px 24px; } }

    /* HEADER */
    .page-header { padding: 160px 64px 60px; background: linear-gradient(180deg, var(--blush) 0%, var(--cream) 100%); }
    .page-header .eyebrow { font-size: 0.65rem; letter-spacing: 0.45em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; }
    .page-header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 5vw, 3.6rem); font-weight: 300; color: var(--dark); margin-bottom: 10px; line-height: 1.15; }
    .page-header h1 em { font-style: italic; color: var(--rose); }
    .page-header p { font-size: 0.9rem; color: var(--muted); line-height: 1.8; }
    @media (max-width: 900px) { .page-header { padding: 120px 24px 48px; } }

    /* MAIN */
    .main-wrap { max-width: 780px; margin: 0 auto; padding: 48px 64px 100px; }
    @media (max-width: 900px) { .main-wrap { padding: 32px 24px 80px; } }

    /* SECCIÓN */
    .section-label {
      font-size: 0.62rem; letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 18px; margin-top: 48px;
    }
    .section-label:first-child { margin-top: 0; }

    /* TARJETA DE SESIÓN */
    .sesion-card {
      background: white; border-radius: 18px; padding: 22px 26px;
      box-shadow: 0 2px 16px rgba(61,43,43,0.06);
      border: 1.5px solid var(--beige);
      display: flex; align-items: flex-start; gap: 20px;
      margin-bottom: 14px; transition: box-shadow 0.2s;
    }
    .sesion-card:hover { box-shadow: 0 4px 24px rgba(61,43,43,0.10); }
    .sesion-card.cancelada { opacity: 0.55; }

    .sesion-icon {
      width: 48px; height: 48px; border-radius: 14px;
      background: var(--blush); display: flex; align-items: center;
      justify-content: center; font-size: 1.4rem; flex-shrink: 0;
    }
    .sesion-icon.online    { background: #eaf5fb; }
    .sesion-icon.presencial { background: var(--blush); }

    .sesion-body { flex: 1; min-width: 0; }
    .sesion-servicio {
      font-family: 'Cormorant Garamond', serif; font-size: 1.15rem;
      font-weight: 400; color: var(--dark); margin-bottom: 5px;
    }
    .sesion-meta {
      font-size: 0.8rem; color: var(--muted); line-height: 1.7;
    }
    .sesion-meta strong { color: var(--dark); font-weight: 400; }

    .sesion-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .badge {
      font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 20px; font-weight: 600;
    }
    .badge-confirmada { background: #e6f4ee; color: var(--green); }
    .badge-cancelada  { background: #fde8e8; color: var(--red); }
    .badge-pasada     { background: var(--beige); color: var(--muted); }
    .badge-online     { background: #eaf5fb; color: #4a90b8; }
    .badge-presencial { background: var(--blush); color: var(--rose); }

    .btn-cancelar {
      flex-shrink: 0; margin-top: 2px;
      background: none; border: 1.5px solid var(--beige);
      color: var(--muted); padding: 7px 16px; border-radius: 10px;
      font-family: 'Nunito', sans-serif; font-size: 0.72rem;
      letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-cancelar:hover { border-color: var(--red); color: var(--red); }

    /* VACÍO */
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty-state .big { font-size: 3rem; margin-bottom: 16px; }
    .empty-state h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; color: var(--dark); margin-bottom: 10px; }
    .empty-state p { font-size: 0.88rem; line-height: 1.8; margin-bottom: 24px; }
    .empty-state a, .empty-state button {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--rose); color: white; padding: 12px 28px;
      border-radius: 30px; font-size: 0.75rem; letter-spacing: 0.2em;
      text-transform: uppercase; text-decoration: none; transition: all 0.2s;
      border: none; cursor: pointer; font-family: 'Nunito', sans-serif;
    }
    .empty-state a:hover, .empty-state button:hover { background: var(--dark); }

    /* MODAL CONFIRMACIÓN */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(61,43,43,0.4); z-index: 200;
      align-items: center; justify-content: center; padding: 24px;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: white; border-radius: 20px; padding: 36px 32px;
      max-width: 400px; width: 100%; text-align: center;
      box-shadow: 0 20px 60px rgba(61,43,43,0.2);
    }
    .modal-box h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 400; color: var(--dark); margin-bottom: 10px; }
    .modal-box p  { font-size: 0.85rem; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }
    .modal-btns   { display: flex; gap: 12px; justify-content: center; }
    .btn-modal-cancel { background: var(--beige); color: var(--dark); padding: 10px 24px; border-radius: 10px; border: none; font-family: 'Nunito', sans-serif; font-size: 0.8rem; cursor: pointer; transition: opacity 0.2s; }
    .btn-modal-cancel:hover { opacity: 0.8; }
    .btn-modal-confirm { background: var(--red); color: white; padding: 10px 24px; border-radius: 10px; border: none; font-family: 'Nunito', sans-serif; font-size: 0.8rem; cursor: pointer; transition: opacity 0.2s; }
    .btn-modal-confirm:hover { opacity: 0.8; }

    /* FOOTER */
    footer { text-align: center; padding: 32px; font-size: 0.78rem; color: var(--muted); border-top: 1px solid var(--beige); }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <span class="nav-logo-main">Energía Holística Majo</span>
    <span class="nav-logo-sub">Psicóloga &amp; Terapeuta</span>
  </a>
  <a href="index.html" class="nav-back">← Inicio</a>
  <div id="navUserArea" style="display:flex;align-items:center;gap:14px"></div>
</nav>

<header class="page-header">
  <p class="eyebrow">Mi espacio</p>
  <h1>Mis <em>sesiones</em></h1>
  <p id="headerSub">Cargando…</p>
</header>

<main class="main-wrap" id="mainWrap">
  <div class="empty-state">
    <div class="big">✨</div>
    Cargando…
  </div>
</main>

<!-- Modal de confirmación de cancelación -->
<div class="modal-overlay" id="modalCancelar">
  <div class="modal-box">
    <h3>Cancelar sesión</h3>
    <p id="modalTexto">¿Estás segura de que deseas cancelar esta sesión?</p>
    <div class="modal-btns">
      <button class="btn-modal-cancel" onclick="cerrarModal()">No, volver</button>
      <button class="btn-modal-confirm" id="modalConfirmBtn">Sí, cancelar</button>
    </div>
  </div>
</div>

<footer>
  <strong>Energía Holística Majo</strong> · Psicóloga &amp; Terapeuta Holística
</footer>

<script>
  const SB_URL = 'https://yvuzccxqkkytuisgzpqx.supabase.co';
  const SB_KEY = 'sb_publishable_FIYlXkb_cpgXlWW8zF8Gww_sDNLFegi';

  const DIAS   = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const MESES  = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  function formatFecha(fechaStr) {
    const d = new Date(fechaStr + 'T12:00:00');
    return `${DIAS[d.getDay()]} ${d.getDate()} de ${MESES[d.getMonth()]} de ${d.getFullYear()}`;
  }

  function updateNavAuth(user, perfil) {
    const area = document.getElementById('navUserArea');
    if (!area) return;
    if (user) {
      const nombre = perfil?.nombre || user.email.split('@')[0];
      area.innerHTML = `
        <span style="font-size:0.72rem;color:var(--muted);font-family:'Nunito',sans-serif">${nombre}</span>
        <button onclick="doLogout().then(()=>location.href='index.html')" style="background:none;border:1.5px solid var(--beige);padding:6px 14px;border-radius:20px;font-family:'Nunito',sans-serif;font-size:0.68rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);cursor:pointer">Salir</button>`;
    } else {
      area.innerHTML = `<button onclick="openLogin('Inicia sesión para ver tus sesiones')" style="background:none;border:1.5px solid var(--rose);padding:7px 20px;border-radius:20px;font-family:'Nunito',sans-serif;font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--rose);cursor:pointer">Ingresar</button>`;
    }
  }

  // Modal de cancelación
  let _cancelarId = null;
  function abrirModalCancelar(id, servicio, fecha) {
    _cancelarId = id;
    document.getElementById('modalTexto').innerHTML =
      `¿Deseas cancelar la sesión de <strong>${servicio}</strong> del <strong>${fecha}</strong>?<br><br>
       <span style="font-size:0.78rem;color:var(--muted)">Esta acción no se puede deshacer. Si necesitas reagendar, puedes hacerlo desde la página de inicio.</span>`;
    document.getElementById('modalCancelar').classList.add('active');
    document.getElementById('modalConfirmBtn').onclick = confirmarCancelacion;
  }
  function cerrarModal() {
    document.getElementById('modalCancelar').classList.remove('active');
    _cancelarId = null;
  }
  document.getElementById('modalCancelar').addEventListener('click', e => {
    if (e.target === e.currentTarget) cerrarModal();
  });

  async function confirmarCancelacion() {
    if (!_cancelarId) return;
    const btn = document.getElementById('modalConfirmBtn');
    btn.textContent = 'Cancelando…';
    btn.disabled = true;
    try {
      await fetch(`${SB_URL}/rest/v1/reservas?id=eq.${_cancelarId}`, {
        method: 'PATCH',
        headers: {
          'apikey': SB_KEY,
          'Authorization': 'Bearer ' + SB_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ estado: 'cancelada' })
      });
      cerrarModal();
      // Actualizar la tarjeta sin recargar todo
      const card = document.getElementById(`sesion-${_cancelarId}`);
      if (card) {
        card.classList.add('cancelada');
        card.querySelector('.badge-confirmada')?.classList.replace('badge-confirmada', 'badge-cancelada');
        card.querySelector('.badge-confirmada') || card.querySelectorAll('.badge').forEach(b => {
          if (b.textContent === 'Confirmada') { b.textContent = 'Cancelada'; b.className = 'badge badge-cancelada'; }
        });
        card.querySelector('.btn-cancelar')?.remove();
      }
    } catch(e) {
      cerrarModal();
      alert('Error al cancelar. Intenta de nuevo.');
    }
    btn.textContent = 'Sí, cancelar';
    btn.disabled = false;
  }

  async function loadMisSesiones(user, perfil) {
    const main  = document.getElementById('mainWrap');
    const subEl = document.getElementById('headerSub');

    if (!user) {
      subEl.textContent = 'Inicia sesión para ver tus sesiones.';
      main.innerHTML = `
        <div class="empty-state">
          <div class="big">🔒</div>
          <h2>Acceso <em style="font-style:italic;color:var(--rose)">privado</em></h2>
          <p>Inicia sesión con el correo con el que realizaste tu reserva<br>para ver tus sesiones agendadas.</p>
          <button onclick="openLogin('Inicia sesión para ver tus sesiones')">Iniciar sesión →</button>
        </div>`;
      return;
    }

    const nombre = perfil?.nombre || user.email.split('@')[0];
    subEl.textContent = `Hola, ${nombre}. Aquí están tus sesiones.`;

    try {
      const token = await getAuthToken();
      const today = new Date().toISOString().slice(0, 10);

      const res = await fetch(
        `${SB_URL}/rest/v1/reservas?email_cliente=eq.${encodeURIComponent(user.email)}&order=fecha.asc,hora_inicio.asc&select=*`,
        { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token } }
      );
      const reservas = await res.json();

      if (!Array.isArray(reservas) || !reservas.length) {
        main.innerHTML = `
          <div class="empty-state">
            <div class="big">🌱</div>
            <h2>Aún no tienes <em style="font-style:italic;color:var(--rose)">sesiones</em></h2>
            <p>Cuando agendes una sesión aparecerá aquí.<br>Puedes reservar desde la página de inicio.</p>
            <a href="index.html#booking">Reservar una sesión →</a>
          </div>`;
        return;
      }

      const proximas  = reservas.filter(r => r.fecha >= today && r.estado !== 'cancelada');
      const historial = reservas.filter(r => r.fecha <  today || r.estado === 'cancelada');

      let html = '';

      // ── Próximas ──
      html += `<p class="section-label">Próximas sesiones</p>`;
      if (!proximas.length) {
        html += `<p style="color:var(--muted);font-size:0.85rem;margin-bottom:8px">No tienes sesiones próximas.</p>`;
      } else {
        html += proximas.map(r => renderSesion(r, today, true)).join('');
      }

      // ── Historial ──
      if (historial.length) {
        html += `<p class="section-label">Historial</p>`;
        html += historial.map(r => renderSesion(r, today, false)).join('');
      }

      main.innerHTML = html;

    } catch(e) {
      main.innerHTML = `
        <div class="empty-state">
          <div class="big">😔</div>
          <h2>Algo salió mal</h2>
          <p>No pudimos cargar tus sesiones. Intenta de nuevo.</p>
          <button onclick="location.reload()">Reintentar</button>
        </div>`;
    }
  }

  function renderSesion(r, today, showCancel) {
    const esCancelada = r.estado === 'cancelada';
    const esPasada    = r.fecha < today;
    const esOnline    = (r.modalidad || '').toLowerCase() === 'online';
    const iconoMod    = esOnline ? '💻' : '🌸';
    const fechaStr    = formatFecha(r.fecha);

    // Permitir cancelar solo si faltan más de 24h
    const sesionDate  = new Date(r.fecha + 'T' + (r.hora_inicio || '00:00') + ':00');
    const horasRestantes = (sesionDate - new Date()) / 36e5;
    const puedeCancelar  = showCancel && !esCancelada && !esPasada && horasRestantes > 24;

    const badgeEstado = esCancelada
      ? '<span class="badge badge-cancelada">Cancelada</span>'
      : esPasada
        ? '<span class="badge badge-pasada">Completada</span>'
        : '<span class="badge badge-confirmada">Confirmada</span>';

    const badgeMod = esOnline
      ? '<span class="badge badge-online">💻 Online</span>'
      : '<span class="badge badge-presencial">🌸 Presencial</span>';

    const btnCancelar = puedeCancelar
      ? `<button class="btn-cancelar" onclick="abrirModalCancelar('${r.id}','${r.servicio_nombre}','${fechaStr}')">Cancelar</button>`
      : '';

    const avisoTiempo = showCancel && !esCancelada && !esPasada && horasRestantes <= 24 && horasRestantes > 0
      ? `<span style="font-size:0.72rem;color:var(--muted);margin-top:6px;display:block">Para cancelar contacta directamente a Majo.</span>`
      : '';

    return `
      <div class="sesion-card ${esCancelada ? 'cancelada' : ''}" id="sesion-${r.id}">
        <div class="sesion-icon ${esOnline ? 'online' : 'presencial'}">${iconoMod}</div>
        <div class="sesion-body">
          <div class="sesion-servicio">${r.servicio_nombre}</div>
          <div class="sesion-meta">
            <strong>${fechaStr}</strong> · ${r.hora_inicio}–${r.hora_fin} hrs
          </div>
          <div class="sesion-badges">
            ${badgeEstado}
            ${badgeMod}
          </div>
          ${avisoTiempo}
        </div>
        ${btnCancelar}
      </div>`;
  }
</script>
<script src="js/auth.js"></script>
<script>
  initAuth(async (user, perfil) => {
    updateNavAuth(user, perfil);
    await loadMisSesiones(user, perfil);
  });
</script>
</body>
</html>
