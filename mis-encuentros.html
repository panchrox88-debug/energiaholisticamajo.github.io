<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://yvuzccxqkkytuisgzpqx.supabase.co https://script.google.com https://script.googleusercontent.com; object-src 'none'; base-uri 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mis Encuentros — Energía Holística Majo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Nunito:wght@200;300;400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --rose:#c9858a; --rose-lt:#dba8ac; --blush:#f0dada;
      --cream:#faf5f0; --beige:#ede0d4; --gold:#c9a96e;
      --dark:#3d2b2b; --muted:#7a5c5c;
    }
    html { font-size: 18px; }
    body { background: var(--cream); color: var(--dark); font-family: 'Nunito', sans-serif; font-weight: 300; }

    nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 22px 64px; background: rgba(250,245,240,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(201,133,138,0.12); z-index: 100; }
    .nav-logo { display: flex; flex-direction: column; line-height: 1.1; text-decoration: none; }
    .nav-logo-main { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 400; letter-spacing: 0.12em; color: var(--rose); }
    .nav-logo-sub  { font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); }
    .nav-back { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
    .nav-back:hover { color: var(--rose); }
    @media (max-width: 900px) { nav { padding: 18px 24px; } .nav-back { display: none; } }

    .page-header { padding: 160px 64px 60px; background: linear-gradient(180deg, var(--blush) 0%, var(--cream) 100%); }
    .page-header .eyebrow { font-size: 0.65rem; letter-spacing: 0.45em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; }
    .page-header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 5vw, 3.6rem); font-weight: 300; color: var(--dark); margin-bottom: 10px; }
    .page-header h1 em { font-style: italic; color: var(--rose); }
    .page-header p { font-size: 0.9rem; color: var(--muted); line-height: 1.8; }
    @media (max-width: 900px) { .page-header { padding: 120px 24px 48px; } }

    .lista { display: flex; flex-direction: column; gap: 20px; padding: 48px 64px 100px; max-width: 860px; margin: 0 auto; }
    @media (max-width: 900px) { .lista { padding: 32px 24px 80px; } }

    .enc-card { background: white; border-radius: 18px; padding: 24px 28px; box-shadow: 0 4px 24px rgba(61,43,43,0.07); display: flex; align-items: flex-start; gap: 22px; }
    .enc-card-img { width: 90px; height: 90px; border-radius: 12px; object-fit: cover; flex-shrink: 0; background: linear-gradient(135deg, var(--blush), var(--beige)); display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    .enc-card-img img { width: 90px; height: 90px; border-radius: 12px; object-fit: cover; }
    .enc-card-body { flex: 1; min-width: 0; }
    .enc-card-motivo { font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--rose); margin-bottom: 4px; }
    .enc-card-titulo { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 300; color: var(--dark); margin-bottom: 8px; }
    .enc-card-meta { display: flex; flex-wrap: wrap; gap: 10px; font-size: 0.78rem; color: var(--muted); margin-bottom: 12px; }
    .enc-card-meta span { display: flex; align-items: center; gap: 4px; }
    .btn-ver { display: inline-flex; align-items: center; gap: 6px; background: var(--rose); color: white; padding: 8px 18px; border-radius: 30px; font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; text-decoration: none; transition: all 0.2s; }
    .btn-ver:hover { background: var(--dark); }
    .badge-pasado { font-size: 0.68rem; background: var(--beige); color: var(--muted); padding: 4px 12px; border-radius: 20px; }

    @media (max-width: 480px) {
      .enc-card { flex-direction: column; }
      .enc-card-img { width: 100%; height: 160px; border-radius: 12px 12px 0 0; }
      .enc-card-img img { width: 100%; height: 160px; border-radius: 12px 12px 0 0; }
    }

    .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty-state .big { font-size: 3.5rem; margin-bottom: 20px; }
    .empty-state h2 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; color: var(--dark); margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; line-height: 1.8; margin-bottom: 28px; }
    .empty-state a { display: inline-flex; align-items: center; gap: 8px; background: var(--rose); color: white; padding: 12px 28px; border-radius: 30px; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; text-decoration: none; }
    .empty-state a:hover { background: var(--dark); }

    footer { text-align: center; padding: 32px; font-size: 0.78rem; color: var(--muted); border-top: 1px solid var(--beige); }

    /* Cuerpo +2px mobile */
    @media (max-width: 900px) {
      .page-header p { font-size: 1.025rem; }
      .empty-state p { font-size: 1.025rem; }
    }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">
    <span class="nav-logo-main">Energía Holística Majo</span>
    <span class="nav-logo-sub">Psicóloga & Terapeuta</span>
  </a>
  <a href="encuentros.html" class="nav-back">← Encuentros</a>
  <div id="navUserArea" style="display:flex;align-items:center;gap:14px"></div>
</nav>

<header class="page-header">
  <p class="eyebrow">Mi espacio</p>
  <h1>Mis <em>encuentros</em></h1>
  <p id="headerSub">Cargando…</p>
</header>

<main class="lista" id="lista">
  <div class="empty-state"><div class="big">✨</div>Cargando…</div>
</main>

<footer><strong>Energía Holística Majo</strong> · Psicóloga &amp; Terapeuta Holística</footer>

<script>
  // Banner al volver de MP
  (function() {
    const params    = new URLSearchParams(window.location.search);
    const pago      = params.get('pago');
    const paymentId = params.get('payment_id') || params.get('collection_id');
    const extRef    = params.get('external_reference') || '';

    if (!pago) return;
    history.replaceState({}, '', window.location.pathname);

    if (pago === 'ok') {
      const b = document.createElement('div');
      b.style.cssText = 'background:#d4edda;color:#155724;border:1px solid #c3e6cb;border-radius:10px;padding:16px 20px;margin:24px auto 0;max-width:860px;text-align:center;font-size:1rem;';
      b.innerHTML = '✅ <strong>¡Inscripción confirmada!</strong> Tu pago fue procesado. Enviando correo… 🌸';
      document.querySelector('main')?.before(b);

      if (paymentId && typeof APPS_URL !== 'undefined') {
        const appsUrl = APPS_URL + '?action=confirmarPago&payment_id=' + encodeURIComponent(paymentId)
          + (extRef ? '&external_reference=' + encodeURIComponent(extRef) : '');
        fetch(appsUrl)
          .then(r => r.json())
          .then(data => { if (data.ok) b.innerHTML = '✅ <strong>¡Inscripción confirmada!</strong> ¡Te esperamos! 🌸'; })
          .catch(() => {});
      }

    } else if (pago === 'error') {
      if (extRef.startsWith('inscripcion:') && typeof SB_URL !== 'undefined') {
        const id = extRef.split(':')[1];
        fetch(SB_URL + '/rest/v1/inscripciones?id=eq.' + id + '&estado=eq.pendiente_pago', {
          method: 'PATCH',
          headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY,
                     'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
          body: JSON.stringify({ estado: 'cancelada' })
        }).catch(() => {});
      }
      const b = document.createElement('div');
      b.style.cssText = 'background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;border-radius:10px;padding:16px 20px;margin:24px auto 0;max-width:860px;text-align:center;font-size:1rem;';
      b.innerHTML = '❌ <strong>El pago no fue procesado.</strong> Puedes intentarlo de nuevo desde <a href="encuentros.html" style="color:#721c24;font-weight:600">los encuentros</a>.';
      document.querySelector('main')?.before(b);
    }
  })();

  const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const DIAS  = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];

  function fmtFecha(f) {
    if (!f) return '';
    const [y, m, d] = f.split('-');
    const dt = new Date(parseInt(y), parseInt(m)-1, parseInt(d));
    return `${DIAS[dt.getDay()]} ${parseInt(d)} de ${MESES[parseInt(m)-1]}`;
  }
  function fmtHora(h) { return h ? h.substring(0,5) : ''; }

  async function loadMisEncuentros(user, perfil) {
    const lista = document.getElementById('lista');
    const subEl = document.getElementById('headerSub');

    if (!user) {
      subEl.textContent = 'Inicia sesión para ver tus encuentros.';
      lista.innerHTML = `
        <div class="empty-state">
          <div class="big">🔒</div>
          <h2>Acceso <em style="font-style:italic;color:var(--rose)">privado</em></h2>
          <p>Inicia sesión para ver los encuentros en los que te has inscrito.</p>
          <button onclick="openLogin('Inicia sesión')" style="display:inline-flex;align-items:center;gap:8px;background:var(--rose);color:white;padding:12px 28px;border-radius:30px;font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;border:none;cursor:pointer">Iniciar sesión →</button>
        </div>`;
      return;
    }

    const nombre = perfil?.nombre || user.email.split('@')[0];
    subEl.textContent = `Hola, ${nombre}. Aquí están tus encuentros.`;

    try {
      const token = await getAuthToken();
      const res = await fetch(`${SB_URL}/rest/v1/inscripciones?user_id=eq.${user.id}&estado=eq.confirmada&select=*,encuentros(*)`, {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token }
      });
      const inscripciones = await res.json();

      if (!Array.isArray(inscripciones) || !inscripciones.length) {
        lista.innerHTML = `
          <div class="empty-state">
            <div class="big">🌱</div>
            <h2>Aún no tienes <em style="font-style:italic;color:var(--rose)">encuentros</em></h2>
            <p>Cuando te inscribas en un encuentro aparecerá aquí.</p>
            <a href="encuentros.html">Ver próximos encuentros →</a>
          </div>`;
        return;
      }

      const hoy = new Date().toISOString().slice(0,10);
      lista.innerHTML = inscripciones.map(ins => {
        const e = ins.encuentros;
        if (!e) return '';
        const pasado = e.fecha < hoy;
        const imgHTML = e.imagen
          ? `<div class="enc-card-img"><img src="${e.imagen}" alt="${e.titulo}"/></div>`
          : `<div class="enc-card-img">🌿</div>`;
        return `
          <div class="enc-card">
            ${imgHTML}
            <div class="enc-card-body">
              ${e.motivo ? `<p class="enc-card-motivo">${e.motivo}</p>` : ''}
              <h2 class="enc-card-titulo">${e.titulo}</h2>
              <div class="enc-card-meta">
                <span>📅 ${fmtFecha(e.fecha)}</span>
                <span>🕐 ${fmtHora(e.hora_inicio)}</span>
                <span>${e.modalidad === 'online' ? '💻 Online' : '🌸 Presencial'}</span>
              </div>
              ${pasado
                ? `<span class="badge-pasado">Encuentro pasado</span>`
                : `<a href="encuentro.html?id=${e.id}" class="btn-ver">Ver detalles →</a>`}
            </div>
          </div>`;
      }).join('');
    } catch(e) {
      lista.innerHTML = `<div class="empty-state"><div class="big">😔</div>Error al cargar. Intenta de nuevo.</div>`;
    }
  }
</script>
<script src="js/auth.js"></script>
<script>
  initAuth(function(user, perfil) {
    updateNavAuth(user, perfil);
    loadMisEncuentros(user, perfil);
  });
</script>
<script src="js/float-buttons.js"></script>
</body>
</html>
