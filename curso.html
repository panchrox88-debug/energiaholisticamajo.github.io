<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Curso — Energía Holística Majo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Nunito:wght@200;300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --rose:    #c9858a;
      --rose-lt: #dba8ac;
      --blush:   #f0dada;
      --cream:   #faf5f0;
      --beige:   #ede0d4;
      --gold:    #c9a96e;
      --gold-lt: #e8d5b0;
      --dark:    #3d2b2b;
      --muted:   #7a5c5c;
      --white:   #ffffff;
      --tema:    #c9858a; /* se sobreescribe con color_tema del curso */
    }
    html { scroll-behavior: smooth; }
    body { background: var(--cream); color: var(--dark); font-family: 'Nunito', sans-serif; font-weight: 300; overflow-x: hidden; }

    /* NAV */
    nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 22px 64px; background: rgba(250,245,240,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(201,133,138,0.12); z-index: 100; }
    .nav-logo { display: flex; flex-direction: column; line-height: 1.1; text-decoration: none; }
    .nav-logo-main { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 400; letter-spacing: 0.12em; color: var(--rose); }
    .nav-logo-sub  { font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); }
    .nav-back { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
    .nav-back:hover { color: var(--rose); }
    .nav-btn { background: var(--rose); color: white; border: none; padding: 10px 28px; font-family: 'Nunito', sans-serif; font-size: 0.72rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; border-radius: 40px; cursor: pointer; transition: background 0.3s; text-decoration: none; }
    .nav-btn:hover { background: var(--dark); }

    /* PROGRESS */
    .progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--tema); z-index: 200; transition: width 0.1s; width: 0; }

    /* HERO */
    .hero { min-height: 70vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 140px 64px 80px; position: relative; overflow: hidden; }
    .hero-bg { position: absolute; inset: 0; opacity: 0.12; }
    .hero-inner { position: relative; z-index: 1; max-width: 700px; }
    .hero-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 18px; border-radius: 20px; font-size: 0.68rem; letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 24px; }
    .hero-cat  { display: inline-flex; align-items: center; gap: 8px; background: var(--beige); color: var(--muted); padding: 5px 14px; border-radius: 20px; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 12px; }
    .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 300; line-height: 1.15; color: var(--dark); margin-bottom: 24px; }
    .hero h1 em { font-style: italic; color: var(--tema); }
    .hero-desc { font-size: 0.95rem; line-height: 2; color: var(--muted); max-width: 560px; margin: 0 auto 40px; }
    .hero-cta { display: inline-flex; align-items: center; gap: 10px; color: white; padding: 14px 36px; border-radius: 40px; font-family: 'Nunito', sans-serif; font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase; text-decoration: none; transition: all 0.3s; background: var(--tema); border: none; cursor: pointer; }
    .hero-cta:hover { filter: brightness(0.88); transform: translateY(-2px); }

    /* INTRO */
    .intro { max-width: 760px; margin: 0 auto; padding: 80px 64px; text-align: center; }
    .intro .eyebrow { font-size: 0.65rem; letter-spacing: 0.45em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
    .intro p { font-size: 0.95rem; line-height: 2.1; color: var(--muted); margin-bottom: 16px; }
    .intro-divider { width: 60px; height: 1px; background: var(--gold-lt); margin: 32px auto; }

    /* ÍNDICE */
    .indice { background: var(--beige); padding: 60px 64px; }
    .indice-inner { max-width: 900px; margin: 0 auto; }
    .indice .eyebrow { font-size: 0.65rem; letter-spacing: 0.45em; text-transform: uppercase; color: var(--gold); text-align: center; margin-bottom: 12px; }
    .indice h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; color: var(--dark); text-align: center; margin-bottom: 36px; }
    .indice-grid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .indice-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; background: white; border-radius: 40px; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
    .indice-item:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .indice-dot { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; }
    .indice-name { font-size: 0.8rem; color: var(--dark); white-space: nowrap; }

    /* SECCIONES */
    .seccion { padding: 80px 64px; }
    .seccion:nth-child(even) { background: var(--beige); }
    .seccion-inner { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 220px 1fr; gap: 64px; align-items: start; }
    .seccion-visual { display: flex; flex-direction: column; align-items: center; gap: 16px; position: sticky; top: 100px; }
    .seccion-circle { width: 160px; height: 160px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; position: relative; }
    .seccion-circle::before { content:''; position:absolute; inset:-10px; border-radius:50%; border:1px solid var(--c,var(--rose)); opacity:0.2; }
    .seccion-icono { font-size: 3.5rem; line-height: 1; }
    .seccion-sanskrit { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.78rem; color: white; opacity: 0.75; }
    .seccion-num { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--c,var(--rose)); }
    .seccion-content {}
    .seccion-eyebrow { font-size: 0.62rem; letter-spacing: 0.4em; text-transform: uppercase; margin-bottom: 10px; }
    .seccion-titulo { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 3vw, 2.6rem); font-weight: 300; color: var(--dark); line-height: 1.2; margin-bottom: 6px; }
    .seccion-titulo em { font-style: italic; }
    .seccion-subtitulo { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .seccion-subtitulo::before { content:'✦'; color:var(--gold); font-size:0.6rem; }
    .seccion-divider { width: 40px; height: 1px; background: var(--gold-lt); margin-bottom: 20px; }
    .seccion-desc { font-size: 0.92rem; line-height: 2.1; color: var(--muted); margin-bottom: 24px; white-space: pre-line; }
    .seccion-afirmacion { background: var(--cream); border-left: 3px solid var(--c,var(--rose)); padding: 14px 18px; border-radius: 0 10px 10px 0; margin-top: 20px; }
    .seccion-afirmacion-label { font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
    .seccion-afirmacion p { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-style: italic; color: var(--dark); line-height: 1.6; }
    /* Imagen de sección */
    .seccion-img { border-radius: 16px; object-fit: cover; display: block; }
    .seccion-img-arriba { width: 100%; max-height: 340px; margin-bottom: 24px; }
    .seccion-img-abajo  { width: 100%; max-height: 340px; margin: 24px 0 8px; }
    .seccion-lateral { display: flex; gap: 32px; align-items: flex-start; }
    .seccion-lateral .seccion-img { width: 42%; flex-shrink: 0; max-height: 360px; align-self: stretch; }
    .seccion-lateral-text { flex: 1; min-width: 0; }
    @media (max-width: 700px) {
      .seccion-lateral { flex-direction: column !important; }
      .seccion-lateral .seccion-img { width: 100%; max-height: 240px; }
    }

    /* CIERRE */
    .cierre { text-align: center; padding: 100px 64px; background: linear-gradient(180deg, var(--cream) 0%, var(--blush) 100%); }
    .cierre .eyebrow { font-size: 0.65rem; letter-spacing: 0.45em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
    .cierre h2 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 4vw, 3rem); font-weight: 300; color: var(--dark); margin-bottom: 20px; line-height: 1.3; }
    .cierre h2 em { font-style: italic; color: var(--rose); }
    .cierre p { font-size: 0.9rem; line-height: 2; color: var(--muted); max-width: 500px; margin: 0 auto 36px; }
    .cierre-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn-cta { display: inline-flex; align-items: center; gap: 8px; background: var(--rose); color: white; padding: 13px 32px; border-radius: 40px; font-family: 'Nunito', sans-serif; font-size: 0.75rem; letter-spacing: 0.18em; text-transform: uppercase; text-decoration: none; transition: all 0.3s; }
    .btn-cta:hover { background: var(--dark); transform: translateY(-2px); }
    .btn-ghost { display: inline-flex; align-items: center; gap: 8px; background: transparent; color: var(--rose); padding: 13px 32px; border-radius: 40px; font-family: 'Nunito', sans-serif; font-size: 0.75rem; letter-spacing: 0.18em; text-transform: uppercase; text-decoration: none; border: 1.5px solid var(--rose); transition: all 0.3s; }
    .btn-ghost:hover { background: var(--rose); color: white; }

    /* FOOTER */
    footer { background: var(--dark); color: rgba(255,255,255,0.6); text-align: center; padding: 40px 24px; font-size: 0.75rem; letter-spacing: 0.1em; }
    footer strong { color: var(--rose-lt); }

    /* NOT FOUND */
    .not-found { text-align: center; padding: 200px 24px; }
    .not-found p { color: var(--muted); font-size: 0.9rem; margin-top: 16px; }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      nav { padding: 18px 24px; }
      .hero { padding: 120px 24px 60px; min-height: auto; }
      .intro { padding: 60px 24px; }
      .indice { padding: 48px 24px; }
      .seccion { padding: 60px 24px; }
      .seccion-inner { grid-template-columns: 1fr; gap: 32px; }
      .seccion-visual { position: static; flex-direction: row; justify-content: flex-start; }
      .seccion-circle { width: 100px; height: 100px; }
      .seccion-icono { font-size: 2.5rem; }
      .cierre { padding: 60px 24px; }
    }
  </style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>

<nav>
  <a href="index.html" class="nav-logo">
    <span class="nav-logo-main">Energía Holística Majo</span>
    <span class="nav-logo-sub">Psicóloga & Terapeuta</span>
  </a>
  <a href="cursos.html" class="nav-back">← Volver a cursos</a>
  <a href="index.html#booking" class="nav-btn">Agendar sesión</a>
</nav>

<div id="main"></div>

<footer>
  <strong>Energía Holística Majo</strong> · Psicóloga &amp; Terapeuta Holística · Santiago, Chile
</footer>

<script>
  const SB_URL = 'https://yvuzccxqkkytuisgzpqx.supabase.co';
  const SB_KEY = 'sb_publishable_FIYlXkb_cpgXlWW8zF8Gww_sDNLFegi';

  const id = new URLSearchParams(location.search).get('id');

  async function load() {
    if (!id) { render404(); return; }
    try {
      const res  = await fetch(`${SB_URL}/rest/v1/cursos?id=eq.${id}&activo=eq.true`, {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
      });
      const rows = await res.json();
      const c = rows && rows[0];
      if (!c) { render404(); return; }
      renderCurso(c);
    } catch(e) { render404(); }
  }

  function hex2rgba(hex, a) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  function renderCurso(c) {
    const tema  = c.color_tema || '#c9858a';
    const secs  = c.secciones || [];
    document.title = c.titulo + ' — Energía Holística Majo';

    // Aplicar color tema a CSS var
    document.documentElement.style.setProperty('--tema', tema);
    document.getElementById('progressBar').style.background = tema;

    // Badge gratuito / precio
    const badgeHTML = c.gratuito
      ? `<div class="hero-badge" style="background:#d4edda;color:#2d6a4f">✨ Curso gratuito</div>`
      : c.precio
        ? `<div class="hero-badge" style="background:var(--blush);color:var(--rose)">$${Number(c.precio).toLocaleString('es-CL')}</div>`
        : '';

    const catHTML = c.categoria
      ? `<div class="hero-cat">${c.categoria}</div>`
      : '';

    // CTA hero
    const ctaHTML = secs.length
      ? `<button class="hero-cta" onclick="document.getElementById('sec-0').scrollIntoView({behavior:'smooth'})">Comenzar el recorrido ✦</button>`
      : '';

    // Intro
    const introHTML = c.intro ? `
      <section class="intro">
        <p class="eyebrow">Introducción</p>
        ${c.intro.split(/\n\n+/).map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('')}
        <div class="intro-divider"></div>
      </section>` : '';

    // Índice
    const indiceHTML = secs.length > 1 ? `
      <section class="indice">
        <div class="indice-inner">
          <p class="eyebrow">Contenido</p>
          <h3>${c.titulo}</h3>
          <div class="indice-grid">
            ${secs.map((s,i) => `
              <a class="indice-item" href="#sec-${i}">
                <div class="indice-dot" style="background:${s.color||tema}"></div>
                <span class="indice-name">${s.titulo}</span>
              </a>`).join('')}
          </div>
        </div>
      </section>` : '';

    // Secciones
    const seccionesHTML = secs.map((s, i) => {
      const color = s.color || tema;
      const bg    = hex2rgba(color, 0.15);
      const glow  = hex2rgba(color, 0.25);
      return `
        <section class="seccion" id="sec-${i}" style="${i%2===1?'background:var(--beige)':''}">
          <div class="seccion-inner">
            <div class="seccion-visual">
              <div class="seccion-circle" style="background:radial-gradient(circle at 35% 35%, ${color}, ${color}cc); --c:${color}; box-shadow:0 16px 48px ${glow}">
                <div class="seccion-icono">${s.icono||'✦'}</div>
                ${s.subtitulo ? `<div class="seccion-sanskrit">${s.subtitulo}</div>` : ''}
              </div>
              <div class="seccion-num" style="color:${color}">${String(i+1).padStart(2,'0')}</div>
            </div>
            <div class="seccion-content">
              <div class="seccion-eyebrow" style="color:${color}">Sección ${i+1}</div>
              <h2 class="seccion-titulo">${s.titulo}${s.subtitulo ? `<br><em>${s.subtitulo}</em>` : ''}</h2>
              ${s.ubicacion ? `<div class="seccion-subtitulo">${s.ubicacion}</div>` : ''}
              <div class="seccion-divider"></div>
              ${(()=>{
                const pos  = s.imagen_pos || 'abajo';
                const img  = s.imagen ? `<img src="${s.imagen}" alt="${s.titulo||''}" class="seccion-img seccion-img-${pos}"/>` : '';
                const afir = s.afirmacion ? `<div class="seccion-afirmacion" style="--c:${color}; border-left-color:${color}"><div class="seccion-afirmacion-label">Afirmación</div><p>${s.afirmacion}</p></div>` : '';
                const desc = `<div class="seccion-desc">${s.descripcion||''}</div>`;
                if (!s.imagen) return desc + afir;
                if (pos === 'arriba')    return img + desc + afir;
                if (pos === 'abajo')     return desc + img + afir;
                // izquierda / derecha
                const flexDir = pos === 'izquierda' ? 'row' : 'row-reverse';
                return `<div class="seccion-lateral" style="flex-direction:${flexDir}">${img}<div class="seccion-lateral-text">${desc}${afir}</div></div>`;
              })()}
            </div>
          </div>
        </section>`;
    }).join('');

    document.getElementById('main').innerHTML = `
      <section class="hero" style="background:radial-gradient(ellipse at 50% 60%, ${hex2rgba(tema,0.15)} 0%, transparent 70%), linear-gradient(180deg, var(--blush) 0%, var(--cream) 100%)">
        <div class="hero-inner">
          ${catHTML}
          ${badgeHTML}
          <h1>${c.titulo.replace(/(\S+)\s*$/, '<em>$1</em>')}</h1>
          ${c.descripcion ? `<p class="hero-desc">${c.descripcion}</p>` : ''}
          ${ctaHTML}
        </div>
      </section>
      ${introHTML}
      ${indiceHTML}
      ${seccionesHTML}
      <section class="cierre">
        <p class="eyebrow">¿Lista para el siguiente paso?</p>
        <h2>Tu energía merece<br>atención <em>personalizada</em></h2>
        <p>Si este contenido resonó contigo, te invito a dar el siguiente paso y acompañarte en un proceso de sanación profundo.</p>
        <div class="cierre-btns">
          <a href="index.html#booking" class="btn-cta">Agendar una sesión ✦</a>
          <a href="cursos.html" class="btn-ghost">Ver más cursos</a>
        </div>
      </section>`;
  }

  function render404() {
    document.getElementById('main').innerHTML = `
      <div class="not-found">
        <div style="font-size:3rem">🌸</div>
        <p>Este curso no está disponible.<br><a href="cursos.html" style="color:var(--rose)">Ver todos los cursos →</a></p>
      </div>`;
  }

  window.addEventListener('scroll', () => {
    const h = document.documentElement;
    const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
    document.getElementById('progressBar').style.width = pct + '%';
  });

  load();
</script>
</body>
</html>
