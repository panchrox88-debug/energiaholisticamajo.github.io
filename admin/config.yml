backend:
  name: git-gateway
  branch: main

locale: es

media_folder: img/uploads
public_folder: /img/uploads

collections:

  # ── SERVICIOS ──────────────────────────────────────────────
  - name: servicios
    label: Servicios
    label_singular: Servicio
    files:

      - name: reiki
        label: "🌊 Reiki Usui"
        file: content/reiki.json
        fields:
          - { label: Título,       name: titulo,      widget: string }
          - { label: Descripción,  name: descripcion, widget: text }
          - { label: Modalidad,    name: modo,        widget: select,
              options: ["Presencial", "Online", "Online & Presencial"] }
          - label: Imágenes del carrusel
            name: slides
            widget: list
            summary: "{{fields.src}}"
            field: { label: Imagen, name: src, widget: image }

      - name: psico
        label: "🧠 Psicoterapia Transpersonal"
        file: content/psico.json
        fields:
          - { label: Título,       name: titulo,      widget: string }
          - { label: Descripción,  name: descripcion, widget: text }
          - { label: Modalidad,    name: modo,        widget: select,
              options: ["Presencial", "Online", "Online & Presencial"] }
          - label: Imágenes del carrusel
            name: slides
            widget: list
            summary: "{{fields.src}}"
            field: { label: Imagen, name: src, widget: image }

      - name: limpieza
        label: "✨ Limpieza Energética"
        file: content/limpieza.json
        fields:
          - { label: Título,       name: titulo,      widget: string }
          - { label: Descripción,  name: descripcion, widget: text }
          - { label: Modalidad,    name: modo,        widget: select,
              options: ["Presencial", "Online", "Online & Presencial"] }
          - label: Imágenes del carrusel
            name: slides
            widget: list
            summary: "{{fields.src}}"
            field: { label: Imagen, name: src, widget: image }

      - name: masaje
        label: "💆 Masaje Terapéutico"
        file: content/masaje.json
        fields:
          - { label: Título,       name: titulo,      widget: string }
          - { label: Descripción,  name: descripcion, widget: text }
          - { label: Modalidad,    name: modo,        widget: select,
              options: ["Presencial", "Online", "Online & Presencial"] }
          - label: Imágenes del carrusel
            name: slides
            widget: list
            summary: "{{fields.src}}"
            field: { label: Imagen, name: src, widget: image }

      - name: utero
        label: "🌺 Sanación de Útero"
        file: content/utero.json
        fields:
          - { label: Título,       name: titulo,      widget: string }
          - { label: Descripción,  name: descripcion, widget: text }
          - { label: Modalidad,    name: modo,        widget: select,
              options: ["Presencial", "Online", "Online & Presencial"] }
          - label: Imágenes del carrusel
            name: slides
            widget: list
            summary: "{{fields.src}}"
            field: { label: Imagen, name: src, widget: image }

      - name: circulo
        label: "🌙 Círculos de Mujeres"
        file: content/circulo.json
        fields:
          - { label: Título,       name: titulo,      widget: string }
          - { label: Descripción,  name: descripcion, widget: text }
          - { label: Modalidad,    name: modo,        widget: select,
              options: ["Presencial", "Online", "Online & Presencial"] }
          - label: Imágenes del carrusel
            name: slides
            widget: list
            summary: "{{fields.src}}"
            field: { label: Imagen, name: src, widget: image }

  # ── CONTACTO ───────────────────────────────────────────────
  - name: contacto
    label: Contacto
    files:
      - name: datos
        label: Datos de contacto
        file: content/contacto.json
        fields:
          - label: Canales de contacto
            name: canales
            widget: list
            fields:
              - { label: Etiqueta, name: etiqueta, widget: string, hint: "Ej: WhatsApp, Instagram, Email, TikTok…" }
              - { label: Valor,    name: valor,    widget: string, hint: "Ej: +56 9 1234 5678 / @usuario" }
              - label: Tipo (ícono)
                name: tipo
                widget: select
                options:
                  - { label: "📱 WhatsApp",  value: whatsapp  }
                  - { label: "📸 Instagram", value: instagram }
                  - { label: "🎵 TikTok",    value: tiktok    }
                  - { label: "📧 Email",     value: email     }
                  - { label: "📍 Ubicación", value: ubicacion }
                  - { label: "🌐 Modalidad", value: modalidad }
                  - { label: "💬 Otro",      value: otro      }

  # ── TESTIMONIOS ────────────────────────────────────────────
  - name: testimonios
    label: Testimonios
    files:
      - name: todos
        label: Todos los testimonios
        file: content/testimonios.json
        fields:
          - label: Testimonios
            name: lista
            widget: list
            fields:
              - { label: Nombre,     name: nombre,    widget: string }
              - { label: Ciudad,     name: ciudad,    widget: string }
              - { label: Texto,      name: texto,     widget: text }
              - { label: Emoji,      name: emoji,     widget: string, default: "🌸" }
