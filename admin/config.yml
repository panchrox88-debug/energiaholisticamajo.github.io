backend:
  name: git-gateway
  branch: main

locale: es

media_folder: img/uploads
public_folder: /img/uploads

collections:

  # ── HERO ───────────────────────────────────────────────────
  - name: hero
    label: "Portada (fotos de fondo)"
    files:
      - name: fotos
        label: Fotos de fondo
        file: content/hero.json
        fields:
          - label: Fotos
            name: fotos
            widget: list
            hint: "Se muestran en carrusel detrás del texto principal. Recomendado: fotos verticales o cuadradas, ambientes cálidos."
            field: { label: Foto, name: src, widget: image }

  # ── SERVICIOS ──────────────────────────────────────────────
  - name: servicios
    label: Servicios
    files:
      - name: todos
        label: Todos los servicios
        file: content/servicios.json
        fields:
          - label: Servicios
            name: lista
            widget: list
            summary: "{{fields.emoji}} {{fields.titulo}}"
            fields:
              - { label: "ID interno (no cambiar)",  name: id,          widget: string,
                  hint: "Solo letras minúsculas y guiones. Ej: reiki, masaje-thai. No cambiar una vez creado." }
              - { label: "Emoji (ícono)",            name: emoji,       widget: string, default: "✨" }
              - { label: Título,                     name: titulo,      widget: string }
              - { label: "Descripción (tarjeta)",    name: descripcion, widget: text }
              - label: Modalidad
                name: modo
                widget: select
                options: ["Presencial", "Online", "Online & Presencial"]
              - label: Imágenes del carrusel
                name: slides
                widget: list
                field: { label: Imagen, name: src, widget: image }

  # ── CONTACTO ───────────────────────────────────────────────
  - name: contacto
    label: Contacto
    files:
      - name: datos
        label: Datos de contacto
        file: content/contacto.json
        fields:
          - label: Canales de contacto
            name: canales
            widget: list
            fields:
              - { label: Etiqueta, name: etiqueta, widget: string, hint: "Ej: WhatsApp, Instagram, Email, TikTok…" }
              - { label: Valor,    name: valor,    widget: string, hint: "Ej: +56 9 1234 5678 / @usuario" }
              - label: Tipo (ícono)
                name: tipo
                widget: select
                options:
                  - { label: "📱 WhatsApp",  value: whatsapp  }
                  - { label: "📸 Instagram", value: instagram }
                  - { label: "🎵 TikTok",    value: tiktok    }
                  - { label: "📧 Email",     value: email     }
                  - { label: "📍 Ubicación", value: ubicacion }
                  - { label: "🌐 Modalidad", value: modalidad }
                  - { label: "💬 Otro",      value: otro      }

  # ── TESTIMONIOS ────────────────────────────────────────────
  - name: testimonios
    label: Testimonios
    files:
      - name: todos
        label: Todos los testimonios
        file: content/testimonios.json
        fields:
          - label: Testimonios
            name: lista
            widget: list
            fields:
              - { label: Nombre,              name: nombre,    widget: string }
              - { label: Ciudad,              name: ciudad,    widget: string }
              - { label: Texto,               name: texto,     widget: text }
              - { label: Emoji,               name: emoji,     widget: string, default: "🌸" }
              - { label: "Calificación (1-5 estrellas)", name: rating, widget: number,
                  min: 1, max: 5, default: 5 }
              - { label: "Mostrar en el sitio", name: visible, widget: boolean, default: false,
                  hint: "Activa para que este testimonio aparezca públicamente en la página." }

  # ── AGENDA ─────────────────────────────────────────────────
  - name: agenda
    label: Agenda
    files:
      - name: disponibilidad
        label: Disponibilidad y horarios
        file: content/agenda.json
        fields:
          - label: Hora de inicio del día
            name: hora_inicio
            widget: string
            default: "9:00"
            hint: "Formato 24h. Ej: 9:00"
          - label: Hora de término del día
            name: hora_fin
            widget: string
            default: "19:00"
            hint: "La última sesión termina antes de esta hora. Ej: 19:00"
          - label: Duración de sesión (minutos)
            name: duracion_sesion
            widget: number
            default: 60
          - label: Pausa entre sesiones (minutos)
            name: pausa_minutos
            widget: number
            default: 15
            hint: "Tiempo de descanso entre una sesión y la siguiente"
          - label: Descanso diario — desde
            name: descanso_desde
            widget: string
            required: false
            hint: "Opcional. Ej: 13:00 — deja en blanco si no hay pausa de almuerzo"
          - label: Descanso diario — hasta
            name: descanso_hasta
            widget: string
            required: false
            hint: "Opcional. Ej: 15:00"
          - label: Días de atención
            name: dias_habiles
            widget: select
            multiple: true
            options:
              - { label: Lunes,     value: 1 }
              - { label: Martes,    value: 2 }
              - { label: Miércoles, value: 3 }
              - { label: Jueves,    value: 4 }
              - { label: Viernes,   value: 5 }
              - { label: Sábado,    value: 6 }
              - { label: Domingo,   value: 0 }
          - label: Fechas bloqueadas
            name: fechas_bloqueadas
            widget: list
            hint: "Días puntuales cerrados: feriados, vacaciones, etc."
            field: { label: Fecha, name: fecha, widget: datetime,
                     format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
