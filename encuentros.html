<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://yvuzccxqkkytuisgzpqx.supabase.co; object-src 'none'; base-uri 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Encuentros — Energía Holística Majo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Nunito:wght@200;300;400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --rose:    #c9858a;
      --rose-lt: #dba8ac;
      --blush:   #f0dada;
      --cream:   #faf5f0;
      --beige:   #ede0d4;
      --gold:    #c9a96e;
      --dark:    #3d2b2b;
      --muted:   #7a5c5c;
    }
    html { font-size: 18px; }
    body { background: var(--cream); color: var(--dark); font-family: 'Nunito', sans-serif; font-weight: 300; }

    nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 22px 64px; background: rgba(250,245,240,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(201,133,138,0.12); z-index: 100; }
    .nav-logo { display: flex; flex-direction: column; line-height: 1.1; text-decoration: none; }
    .nav-logo-main { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 400; letter-spacing: 0.12em; color: var(--rose); }
    .nav-logo-sub  { font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); }
    .nav-back { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
    .nav-back:hover { color: var(--rose); }
    @media (max-width: 900px) { nav { padding: 18px 24px; } .nav-back { display: none; } }

    .page-header { padding: 160px 64px 60px; background: linear-gradient(180deg, var(--blush) 0%, var(--cream) 100%); }
    .page-header .eyebrow { font-size: 0.65rem; letter-spacing: 0.45em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; }
    .page-header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 5vw, 3.6rem); font-weight: 300; color: var(--dark); margin-bottom: 10px; }
    .page-header h1 em { font-style: italic; color: var(--rose); }
    .page-header p { font-size: 0.9rem; color: var(--muted); line-height: 1.8; max-width: 540px; }
    @media (max-width: 900px) { .page-header { padding: 120px 24px 48px; } }

    .encuentros-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 28px; padding: 48px 64px 100px; max-width: 1200px; margin: 0 auto; }
    @media (max-width: 900px)  { .encuentros-grid { grid-template-columns: repeat(2,1fr); padding: 32px 24px 80px; gap: 20px; } }
    @media (max-width: 580px)  { .encuentros-grid { grid-template-columns: 1fr; } }

    .enc-card { background: white; border-radius: 18px; overflow: hidden; box-shadow: 0 4px 24px rgba(61,43,43,0.07); transition: transform 0.3s, box-shadow 0.3s; display: flex; flex-direction: column; text-decoration: none; color: inherit; }
    .enc-card:hover { transform: translateY(-4px); box-shadow: 0 10px 36px rgba(61,43,43,0.12); }
    .enc-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
    .enc-img-placeholder { width: 100%; aspect-ratio: 16/9; background: linear-gradient(135deg, var(--blush), var(--beige)); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
    .enc-body { padding: 20px 22px 22px; flex: 1; display: flex; flex-direction: column; }
    .enc-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .enc-fecha { font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); }
    .enc-cupo { font-size: 0.68rem; color: var(--muted); background: var(--beige); padding: 2px 10px; border-radius: 20px; }
    .enc-titulo { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 300; color: var(--dark); margin-bottom: 8px; line-height: 1.3; }
    .enc-motivo { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--rose); margin-bottom: 10px; }
    .enc-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.75; margin-bottom: 18px; flex: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; word-break: break-word; overflow-wrap: break-word; }
    .enc-footer { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .enc-precio { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--dark); }
    .enc-precio.gratis { color: var(--gold); }
    .enc-cta { display: inline-flex; align-items: center; gap: 8px; background: var(--rose); color: white; padding: 9px 20px; border-radius: 30px; font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; text-decoration: none; transition: all 0.2s; flex-shrink: 0; }
    .enc-cta:hover { background: var(--dark); }
    .enc-agotado { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); background: var(--beige); padding: 9px 20px; border-radius: 30px; }

    .empty-state { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty-state .big { font-size: 3.5rem; margin-bottom: 20px; }
    .empty-state h2 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; color: var(--dark); margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; line-height: 1.8; }

    footer { text-align: center; padding: 32px; font-size: 0.78rem; color: var(--muted); border-top: 1px solid var(--beige); }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">
    <span class="nav-logo-main">Energía Holística Majo</span>
    <span class="nav-logo-sub">Psicóloga & Terapeuta</span>
  </a>
  <a href="index.html" class="nav-back">← Inicio</a>
  <div id="navUserArea" style="display:flex;align-items:center;gap:14px"></div>
</nav>

<header class="page-header">
  <p class="eyebrow">Comunidad</p>
  <h1>Próximos <em>encuentros</em></h1>
  <p>Espacios colectivos de sanación, conexión y crecimiento. Únete a una experiencia compartida.</p>
</header>

<main class="encuentros-grid" id="encuentrosGrid">
  <div class="empty-state"><div class="big">✨</div>Cargando…</div>
</main>

<footer><strong>Energía Holística Majo</strong> · Psicóloga &amp; Terapeuta Holística</footer>

<script>
  const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const DIAS  = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];

  function fmtFecha(f) {
    if (!f) return '';
    const [y, m, d] = f.split('-');
    const dt = new Date(parseInt(y), parseInt(m)-1, parseInt(d));
    return `${DIAS[dt.getDay()]} ${parseInt(d)} de ${MESES[parseInt(m)-1]}`;
  }

  function fmtHora(h) { return h ? h.substring(0,5) : ''; }

  async function loadEncuentros() {
    const grid = document.getElementById('encuentrosGrid');
    try {
      const hoy = new Date().toISOString().slice(0,10);
      const res  = await fetch(`${SB_URL}/rest/v1/encuentros?activo=eq.true&fecha=gte.${hoy}&order=fecha.asc&select=*`, {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
      });
      const data = await res.json();

      // Contar inscritos por encuentro
      const res2 = await fetch(`${SB_URL}/rest/v1/inscripciones?estado=eq.confirmada&select=encuentro_id`, {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
      });
      const inscripciones = await res2.json();

      if (!Array.isArray(data) || !data.length) {
        grid.innerHTML = `<div class="empty-state"><div class="big">🌸</div><h2>Próximamente</h2><p>Estamos preparando nuevos encuentros.<br>Vuelve pronto.</p></div>`;
        return;
      }

      grid.innerHTML = data.map(e => {
        const inscritos = (inscripciones || []).filter(i => i.encuentro_id === e.id).length;
        const agotado   = e.cupo_maximo && inscritos >= e.cupo_maximo;
        const cupoText  = e.cupo_maximo ? `${inscritos}/${e.cupo_maximo} inscritas` : 'Cupo libre';
        const imgHTML   = e.imagen
          ? `<img class="enc-img" src="${e.imagen}" alt="${e.titulo}" loading="lazy"/>`
          : `<div class="enc-img-placeholder">🌿</div>`;
        const precioHTML = e.precio > 0
          ? `<span class="enc-precio">$${Number(e.precio).toLocaleString('es-CL')}</span>`
          : `<span class="enc-precio gratis">Gratuito</span>`;

        return `
          <div class="enc-card">
            <a href="encuentro.html?id=${e.id}" style="text-decoration:none;color:inherit">
              ${imgHTML}
              <div class="enc-body">
                <div class="enc-meta">
                  <span class="enc-fecha">${fmtFecha(e.fecha)} · ${fmtHora(e.hora_inicio)}</span>
                  <span class="enc-cupo">${cupoText}</span>
                </div>
                ${e.motivo ? `<p class="enc-motivo">${e.motivo}</p>` : ''}
                <h2 class="enc-titulo">${e.titulo}</h2>
                <p class="enc-desc">${e.descripcion || ''}</p>
                <div class="enc-footer">
                  ${precioHTML}
                  ${agotado
                    ? `<span class="enc-agotado">Cupo lleno</span>`
                    : `<span class="enc-cta">Ver más →</span>`}
                </div>
              </div>
            </a>
          </div>`;
      }).join('');
    } catch(e) {
      grid.innerHTML = `<div class="empty-state"><div class="big">😔</div>Error al cargar. Intenta de nuevo.</div>`;
    }
  }

  loadEncuentros();
</script>
<script src="js/auth.js"></script>
<script>
  initAuth(function(user, perfil) { updateNavAuth(user, perfil); });
</script>
</body>
</html>
